<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoviTransporte | Ruta Garantizada</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --blue: #002e5d; --orange: #ff5a00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #222; }
        
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* UI SUPERIOR */
        .header { position: absolute; top: 0; width: 100%; z-index: 1000; background: var(--blue); padding: 12px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .profile-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--orange); background: #fff url('https://ui-avatars.com/api/?name=User&background=ff5a00&color=fff') center/cover; cursor: pointer; }

        .search-box { position: absolute; top: 65px; left: 10px; right: 10px; z-index: 1000; background: white; border-radius: 12px; padding: 12px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .search-box input { border: none; width: 100%; outline: none; font-size: 16px; flex: 1; margin: 0 10px; font-weight: bold; }
        .btn-ir { background: var(--orange); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* MENÚ LATERAL */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.4s; box-shadow: 5px 0 20px rgba(0,0,0,0.4); }
        #sidebar.active { left: 0; }
        .menu-header { background: var(--blue); color: white; padding: 30px; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #eee; color: var(--blue); font-weight: bold; cursor: pointer; }

        /* REGISTRO REAL (MODAL) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 4000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .register-card { background: white; width: 85%; max-width: 380px; padding: 25px; border-radius: 20px; text-align: center; }
        .register-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }

        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; display: none; }
        .overlay-bg.active { display: block; }
        /* SUGERENCIAS DEL BUSCADOR */
#sugerencias { position: absolute; top: 115px; left: 10px; right: 10px; z-index: 1001; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; max-height: 200px; overflow-y: auto; }
.sug-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; color: #002e5d; }
.sug-item:hover { background: #f0f4ff; }
.sug-item span { font-size: 12px; color: #888; font-weight: normal; }

/* PANEL DE REPORTE */
#panel-reporte { position: fixed; bottom: -300px; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 20px; z-index: 3000; transition: 0.4s; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); }
#panel-reporte.active { bottom: 0; }
#panel-reporte h3 { color: #002e5d; margin-bottom: 15px; }
.tipo-reporte { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
.tipo-btn { padding: 8px 14px; border: 2px solid #ddd; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; background: white; }
.tipo-btn.selected { border-color: #ff5a00; color: #ff5a00; }
#btn-enviar-reporte { width: 100%; background: #ff5a00; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; }

/* CAMIÓN ANIMADO */
.bus-icon-ani { background: #002e5d; color: white; border-radius: 8px; padding: 3px 6px; font-size: 13px; font-weight: bold; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.4); white-space: nowrap; }

/* INFO CARD DE RUTA */
#info-ruta { position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 1000; background: #002e5d; color: white; border-radius: 14px; padding: 14px; display: none; }
#info-ruta h4 { margin: 0 0 5px; font-size: 16px; }
#info-ruta p { margin: 0; font-size: 13px; color: #aac4e8; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="overlay-bg" class="overlay-bg" onclick="cerrarTodo()"></div>

    <div class="header">
        <i class="fas fa-bars" onclick="abrirMenu()" style="font-size: 24px; cursor: pointer;"></i>
        <div style="font-weight: 900;">MOVITRANSPORTE</div>
        <div class="profile-btn" onclick="abrirRegistro()"></div>
    </div>

    <div class="search-box">
        <i class="fas fa-bus" style="color: var(--blue)"></i>
<input type="text" id="search-input" placeholder="Buscar ruta... ej: 68B, Azteca, CAPU">
        <button class="btn-ir" onclick="buscarRuta()">ir</button>
    </div>

    <div id="sidebar">
        <div class="menu-header"><h3>MoviMenu</h3></div>
        <div class="menu-item" onclick="location.reload()">Reiniciar Mapa</div>
        <div class="menu-item" onclick="verTodasLasRutas()">🗺️ Ver todas las rutas</div>
<div class="menu-item" onclick="abrirReporte()">🚨 Reportar incidente</div>
<div class="menu-item" onclick="location.href='ia.html'">🤖 Asistente IA</div>
        <div class="menu-item" onclick="cerrarTodo()">Cerrar</div>
    </div>

    <div id="modal-reg" class="modal-overlay">
        <div class="register-card">
            <h2 style="color:var(--blue); margin-bottom:15px;">Crear Cuenta</h2>
            <input type="text" placeholder="Nombre">
            <input type="email" placeholder="Correo">
            <input type="password" placeholder="Contraseña">
            <button onclick="cerrarTodo()" style="width:100%; background:var(--blue); color:white; padding:15px; border:none; border-radius:10px; font-weight:bold;">REGISTRARSE</button>
        </div>
    </div>
<!-- Sugerencias del buscador -->
<div id="sugerencias"></div>

<!-- Info card de ruta activa -->
<div id="info-ruta">
    <h4 id="info-nombre"></h4>
    <p id="info-paradas"></p>
</div>

<!-- Panel de reportes -->
<div id="panel-reporte">
    <h3>🚨 Reportar en esta ruta</h3>
    <div class="tipo-reporte">
        <button class="tipo-btn" onclick="seleccionarTipo(this)">🔪 Robo</button>
        <button class="tipo-btn" onclick="seleccionarTipo(this)">💥 Accidente</button>
        <button class="tipo-btn" onclick="seleccionarTipo(this)">⏰ Atraso</button>
        <button class="tipo-btn" onclick="seleccionarTipo(this)">🚧 Desvío</button>
        <button class="tipo-btn" onclick="seleccionarTipo(this)">👮 Revisión</button>
    </div>
    <button id="btn-enviar-reporte" onclick="enviarReporte()">Enviar Reporte</button>
    <button onclick="cerrarReporte()" style="width:100%; margin-top:8px; background:none; border:none; color:#aaa; cursor:pointer;">Cancelar</button>
</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
var map, lineaActiva, busMarker, busInterval;
var tipoReporteSeleccionado = "";

// BASE DE DATOS DE RUTAS — agrega aquí todas las que quieras
const RUTAS = {
    "CAPU-Dorada": {
        nombre: "CAPU → Plaza Dorada",
        color: "#ff5a00",
        paradas: "CAPU → China Poblana → Analco → Plaza Dorada",
        coords: [
            [19.0718, -98.2033],[19.0685, -98.2025],[19.0632, -98.2006],
            [19.0580, -98.1985],[19.0530, -98.1960],[19.0455, -98.1928],
            [19.0410, -98.1945],[19.0355, -98.1975],[19.0315, -98.2005],[19.0305, -98.2010]
        ]
    },
    "68B": {
        nombre: "Ruta 68B — Amalucan → Centro",
        color: "#1E88E5",
        paradas: "Amalucan → Diagonal San Antonio → Fed. Puebla-Tehuacán → Xonaca → Zócalo",
        coords: [
            [19.0508, -98.1454],[19.0559, -98.1469],[19.0613, -98.1435],
            [19.0497, -98.1537],[19.0459, -98.1784],[19.0439, -98.1980]
        ]
    },
    "Azteca": {
        nombre: "Ruta Azteca — Bosques → Final",
        color: "#43A047",
        paradas: "Bosques Amalucan → Gardenias → Final Azteca C",
        coords: [
            [19.0512, -98.1325],[19.0718, -98.1314],[19.0738, -98.1291],[19.0719, -98.1268]
        ]
    }
};


window.onload = function() {
    map = L.map('map', { zoomControl: false }).setView([19.0433, -98.2019], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© CARTO'
    }).addTo(map);

    // Escuchar el buscador
    document.getElementById('search-input').addEventListener('input', mostrarSugerencias);
};
function mostrarSugerencias() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const div = document.getElementById('sugerencias');
    div.innerHTML = "";
    if (q.length < 1) { div.style.display = "none"; return; }

    const resultados = Object.keys(RUTAS).filter(k =>
        k.toLowerCase().includes(q) || RUTAS[k].nombre.toLowerCase().includes(q)
    );

    if (resultados.length === 0) { div.style.display = "none"; return; }

    resultados.forEach(key => {
        div.innerHTML += `<div class="sug-item" onclick="activarRuta('${key}')">
            🚌 ${RUTAS[key].nombre}<br><span>${RUTAS[key].paradas}</span>
        </div>`;
    });
    div.style.display = "block";
}

function buscarRuta() {
    const q = document.getElementById('search-input').value;
    const key = Object.keys(RUTAS).find(k =>
        k.toLowerCase() === q.toLowerCase() || RUTAS[k].nombre.toLowerCase().includes(q.toLowerCase())
    );
    if (key) activarRuta(key);
    else alert("Ruta no encontrada. Prueba: 68B, Azteca, CAPU-Dorada");
}
function activarRuta(key) {
    const ruta = RUTAS[key];
    document.getElementById('sugerencias').style.display = "none";
    document.getElementById('search-input').value = ruta.nombre;

    // Limpiar ruta anterior
    if (lineaActiva) map.removeLayer(lineaActiva);
    if (busMarker) map.removeLayer(busMarker);
    if (busInterval) clearInterval(busInterval);

    // Dibujar línea
    lineaActiva = L.polyline(ruta.coords, {
        color: ruta.color, weight: 7, opacity: 0.9
    }).addTo(map);
    map.fitBounds(lineaActiva.getBounds(), { padding: [60, 60] });

    // Marcadores de inicio y fin
    L.circleMarker(ruta.coords[0], { radius: 8, color: 'white', fillColor: ruta.color, fillOpacity: 1, weight: 3 })
        .addTo(map).bindPopup("🟢 Inicio: " + ruta.nombre);
    L.circleMarker(ruta.coords[ruta.coords.length-1], { radius: 8, color: 'white', fillColor: '#333', fillOpacity: 1, weight: 3 })
        .addTo(map).bindPopup("🔴 Final de ruta");

    // Camión animado
    const icono = L.divIcon({ className: 'bus-icon-ani', html: '🚌 ' + key, iconSize: null });
    busMarker = L.marker(ruta.coords[0], { icon: icono }).addTo(map);
    busMarker.bindPopup("<b>" + ruta.nombre + "</b><br>En circulación");

    let paso = 0;
    busInterval = setInterval(() => {
        paso = (paso + 1) % ruta.coords.length;
        busMarker.setLatLng(ruta.coords[paso]);
    }, 800);

    // Mostrar info card
    document.getElementById('info-nombre').textContent = "🚌 " + ruta.nombre;
    document.getElementById('info-paradas').textContent = ruta.paradas;
    document.getElementById('info-ruta').style.display = "block";
}
function abrirReporte() {
    cerrarTodo();
    document.getElementById('panel-reporte').classList.add('active');
    document.getElementById('overlay-bg').classList.add('active');
}
function cerrarReporte() {
    document.getElementById('panel-reporte').classList.remove('active');
    document.getElementById('overlay-bg').classList.remove('active');
}
function seleccionarTipo(btn) {
    document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    tipoReporteSeleccionado = btn.textContent;
}
function enviarReporte() {
    if (!tipoReporteSeleccionado) { alert("Selecciona el tipo de incidente"); return; }
    // Aquí conectas con Firebase igual que en index.html
    alert("✅ Reporte enviado: " + tipoReporteSeleccionado + "\nGracias por ayudar a la comunidad.");
    cerrarReporte();
    tipoReporteSeleccionado = "";
    document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
}
function abrirMenu() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('overlay-bg').classList.add('active');
}
function abrirRegistro() {
    document.getElementById('modal-reg').classList.add('active');
    document.getElementById('overlay-bg').classList.add('active');
}
function cerrarTodo() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('modal-reg').classList.remove('active');
    document.getElementById('panel-reporte').classList.remove('active');
    document.getElementById('overlay-bg').classList.remove('active');
}
function verTodasLasRutas() {
    cerrarTodo();
    Object.keys(RUTAS).forEach(key => activarRuta(key));
}
    </script>
</body>
</html>
